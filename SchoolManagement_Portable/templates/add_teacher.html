<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Teacher - School Management</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Add New Teacher</h2>
        <form id="addTeacherForm">
            <div class="form-group">
                <label>First Name *</label>
                <input type="text" name="first_name" required>
            </div>
            <div class="form-group">
                <label>Last Name *</label>
                <input type="text" name="last_name" required>
            </div>
            <div class="form-group">
                <label>Phone Number *</label>
                <input type="text" name="phone" required>
            </div>
            <div class="form-group">
                <label>Subject/Course *</label>
                <input type="text" name="subject" required>
            </div>
            <div class="form-group">
                <label>Class Teaching *</label>
                <select name="class_teaching" id="classSelect" required></select>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="text" name="password" value="teacher123">
            </div>
            <button type="submit" class="btn btn-primary">Add Teacher</button>
            <a href="/admin/dashboard" class="btn">Back to Dashboard</a>
        </form>
    </div>
    <div class="marquee-bottom">
        <marquee>System designed by JSLY @ 2026</marquee>
    </div>
    <script>
        async function loadClasses() {
            const res = await fetch('/api/classes');
            const classes = await res.json();
            const select = document.getElementById('classSelect');
            select.innerHTML = classes.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
        }
        
        document.getElementById('addTeacherForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const res = await fetch('/api/teachers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if(res.ok) {
                alert('Teacher added successfully!');
                window.location.href = '/admin/dashboard';
            } else {
                alert('Error adding teacher');
            }
        });
        
        loadClasses();
    </script>
</body>
</html>
