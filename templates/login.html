<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management System - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 450px;
            padding: 45px;
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 45px;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            font-size: 13px;
            margin-bottom: 30px;
        }

        .role-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            background: #f0f0f0;
            border-radius: 50px;
            padding: 5px;
        }

        .role-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 40px;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 15px;
        }

        .role-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .info-text {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }

        .marquee-footer {
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🏫</div>
        <h2>School Management System</h2>
        <div class="subtitle">Login to access your dashboard</div>
        
        <form method="post" action="/login">
            <div class="role-selector">
                <button type="button" class="role-btn active" data-role="admin">👨‍💼 Admin</button>
                <button type="button" class="role-btn" data-role="teacher">👨‍🏫 Teacher</button>
                <button type="button" class="role-btn" data-role="student">👨‍🎓 Student</button>
            </div>
            <input type="hidden" name="role" id="role" value="admin">
            
            <div class="input-group">
                <label for="username">📧 Username / First Name</label>
                <input type="text" name="username" id="username" required placeholder="Enter username">
            </div>
            
            <div class="input-group">
                <label for="password">🔒 Password / Last Name</label>
                <input type="password" name="password" id="password" required placeholder="Enter password">
            </div>
            
            <button type="submit">🔑 Login</button>
        </form>
        
       
    
    <div class="marquee-footer">
        <marquee behavior="scroll" direction="left">🏆 School Management System | Excellence in Education | Designed by JSLY @ 2026</marquee>
    </div>

    <script>
        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('role').value = this.dataset.role;
                
                const usernameField = document.getElementById('username');
                const passwordField = document.getElementById('password');
                
                if (this.dataset.role === 'admin') {
                    usernameField.placeholder = 'Enter username (admin)';
                    passwordField.placeholder = 'Enter password (admin123)';
                } else if (this.dataset.role === 'teacher') {
                    usernameField.placeholder = 'Enter your first name';
                    passwordField.placeholder = 'Enter your password';
                } else {
                    usernameField.placeholder = 'Enter your first name';
                    passwordField.placeholder = 'Enter your last name (as password)';
                }
            });
        });
    </script>
</body>
</html>
