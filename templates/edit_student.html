<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student - School Management</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="form-container" style="max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px;">
        <h2>Edit Student</h2>
        <form id="editStudentForm">
            <input type="hidden" name="student_id" id="studentId">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name" id="firstName" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name" id="lastName" required>
            </div>
            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" id="age" required>
            </div>
            <div class="form-group">
                <label>Parent Name</label>
                <input type="text" name="parent_name" id="parentName" required>
            </div>
            <div class="form-group">
                <label>Parent Phone</label>
                <input type="text" name="parent_phone" id="parentPhone" required>
            </div>
            <div class="form-group">
                <label>Class</label>
                <select name="class_name" id="classSelect" required></select>
            </div>
            <button type="submit" class="btn btn-primary">Update Student</button>
            <a href="/admin/dashboard" class="btn">Cancel</a>
        </form>
    </div>
    <script>
        const studentId = new URLSearchParams(window.location.search).get('id');
        
        async function loadStudent() {
            const res = await fetch(`/api/students/${studentId}`);
            const student = await res.json();
            document.getElementById('studentId').value = student.id;
            document.getElementById('firstName').value = student.first_name;
            document.getElementById('lastName').value = student.last_name;
            document.getElementById('age').value = student.age;
            document.getElementById('parentName').value = student.parent_name;
            document.getElementById('parentPhone').value = student.parent_phone;
            document.getElementById('classSelect').value = student.class_name;
        }
        
        async function loadClasses() {
            const res = await fetch('/api/classes');
            const classes = await res.json();
            const select = document.getElementById('classSelect');
            select.innerHTML = classes.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
        }
        
        document.getElementById('editStudentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                age: document.getElementById('age').value,
                parent_name: document.getElementById('parentName').value,
                parent_phone: document.getElementById('parentPhone').value,
                class_name: document.getElementById('classSelect').value
            };
            const res = await fetch(`/api/students/${studentId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if(res.ok) {
                alert('Student updated!');
                window.location.href = '/admin/dashboard';
            }
        });
        
        loadClasses().then(() => loadStudent());
    </script>
</body>
</html>
